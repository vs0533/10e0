name: Code Review

# 触发器：pull_request (branches: dev/main) + push (feature/**) + workflow_dispatch
# - pull_request: 跟 qwen 时代一样，PR opened/synchronize 到 dev/main 时跑
# - checkout base 分支 + gh pr diff API: 满足 CodeQL untrusted-checkout
#   安全要求（不接触 PR head 非信任代码）
# - REVIEW_BOT_TOKEN (PAT) 调 pulls.createReview 发真 review (算 branch
#   protection approval)；fallback 走 issues.createComment
on:
  pull_request:
    types: [opened, synchronize]
    branches: [dev, main]
  push:
    branches: [feature/**]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to re-review (only used for logging)'
        required: false
        type: string

# pull_request 触发器：用 PAT 发真 review (counts as branch protection approval)
# GITHUB_TOKEN 权限是 read-only，createReview 必须用 PAT
#
# security-events: write — GitHub auto-injects "Perform CodeQL Analysis" step 到所有
# workflow；该 step 需要这个权限才能 upload SARIF 结果到 Security tab。缺它会报：
#   "Error: Please check that your token is valid and has the required permissions:
#    contents: read, security-events: write"
# (PR #31 / #32 时偶发失败，rerun 偶然能过，根因是 token 临时刷新)
#
# 注意：CodeQL 数据库本身由 GitHub default setup 管理 (.github/CLAUDE.md "CodeQL 安全扫描" 段)，
# 仓库**不能**再加 .github/workflows/codeql.yml advanced workflow（与 default setup 冲突）。
# 这里只**补** permission 让 auto-injected step 跑通，**不**改变 CodeQL 配置。
permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write

jobs:
  review:
    name: Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 改用 checkout base 分支（不接触 PR head 非信任代码），满足 CodeQL
      # untrusted-checkout 要求 + PR head 不可信场景安全
      - name: Checkout (base branch, full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff via API (no untrusted checkout)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ -n "$PR_NUMBER" ]; then
            # pull_request_target: 通过 GitHub API 拿 PR diff，不 checkout 非信任代码
            gh pr diff "$PR_NUMBER" > /tmp/pr-diff.txt
          else
            # workflow_dispatch / push 兜底：用本地 git diff
            git diff origin/${{ github.base_ref || 'dev' }}...HEAD > /tmp/pr-diff.txt
          fi
          echo "Diff size: $(wc -c < /tmp/pr-diff.txt) bytes"
          if [ ! -s /tmp/pr-diff.txt ]; then
            echo "::warning::Empty diff. Nothing to review."
            exit 0
          fi

      - name: Run Code Review (MiniMax-M3)
        id: review
        continue-on-error: true
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_BASE_URL: https://api.minimaxi.com/anthropic
          ANTHROPIC_MODEL: MiniMax-M3
          ANTHROPIC_DEFAULT_SONNET_MODEL: MiniMax-M3
          ANTHROPIC_DEFAULT_OPUS_MODEL: MiniMax-M3
          ANTHROPIC_DEFAULT_HAIKU_MODEL: MiniMax-M3
          API_TIMEOUT_MS: "3000000"
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
        run: |
          cat /tmp/pr-diff.txt | claude -p \
            --output-format text \
            --max-turns 1 \
            "Review this git diff for a .NET 10 / C# 14 enterprise framework PR.

            Focus areas:
            1. CQRS pattern correctness (ICommand/IHandler contracts, Pipeline Behaviors order)
            2. EF Core 10 patterns (N+1 queries, DbContext scope, Savepoint transactions)
            3. Security (permissions, JWT secrets, dynamic LINQ injection, row-level filters)
            4. Code quality (async/await, NRT, TreatWarningsAsErrors)

            Output format:
            - 🔴 Critical: Must fix (bugs, security, pattern violations)
            - 🟡 Suggestion: Recommended improvement
            - 🟢 Nit: Optional polish

            If no issues found, confirm the PR looks good with a brief summary.

            ============================================================
            VERDICT RULE (重要，输出末尾必须给单行 verdict):
            - 没有 🔴 Critical → 输出 'VERDICT: APPROVE'
            - 任何 🔴 Critical → 输出 'VERDICT: REQUEST_CHANGES'
            - 不确定 / 解析失败 → 输出 'VERDICT: REQUEST_CHANGES'（保守）
            ============================================================" \
            > /tmp/review-output.txt 2>&1

          echo "Review output saved."

      - name: Parse verdict
        id: parse
        if: always()
        run: |
          set +e
          OUTPUT=""
          if [ -s /tmp/review-output.txt ]; then
            OUTPUT=$(cat /tmp/review-output.txt)
          fi

          # 1) 优先看模型显式输出 VERDICT 行
          VERDICT=$(printf '%s\n' "$OUTPUT" | grep -oE "VERDICT:[[:space:]]*(APPROVE|REQUEST_CHANGES)" | tail -1 | awk '{print $2}')

          # 2) Fallback：扫 🔴 Critical 段
          if [ -z "$VERDICT" ]; then
            if printf '%s' "$OUTPUT" | grep -q "🔴 Critical"; then
              CRIT_CONTENT=$(printf '%s\n' "$OUTPUT" | awk '/🔴 Critical/{flag=1; next} /^$/{flag=0} flag' | wc -l)
              if [ "$CRIT_CONTENT" -gt 0 ]; then
                VERDICT="REQUEST_CHANGES"
              else
                VERDICT="APPROVE"
              fi
            else
              VERDICT="APPROVE"
            fi
          fi

          # 3) 输出为空 → 保守 REQUEST_CHANGES
          if [ -z "$OUTPUT" ]; then
            VERDICT="REQUEST_CHANGES"
            OUTPUT="⚠️ Review workflow 异常退出（无输出）。为安全起见拒绝合并，请人工 review。"
          fi

          # 4) 截断 body（GitHub review body 上限 65536，留点余量）
          if [ ${#OUTPUT} -gt 60000 ]; then
            OUTPUT=$(printf '%s' "$OUTPUT" | head -c 60000)
            OUTPUT="${OUTPUT}\n\n...(truncated, see workflow run log for full output)..."
          fi

          {
            echo "verdict=$VERDICT"
            echo "body<<EOF_BODY"
            echo "$OUTPUT"
            echo "EOF_BODY"
          } >> "$GITHUB_OUTPUT"

          echo "==== Verdict: $VERDICT ===="
          echo "==== Output (first 500 chars) ===="
          printf '%s\n' "$OUTPUT" | head -c 500

      - name: Post Review (PAT if available, else comment fallback)
        if: always()
        uses: actions/github-script@v7
        with:
          # 默认 GITHUB_TOKEN 用于 fallback comment（PAT 失败时绝不让 fallback 用
          # 同一个有问题的 PAT context——否则 createComment 也会 401）
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 重要：从文件读取模型 body 而非 GitHub 表达式插值
            // 后者会引入模板注入（模型输出含反引号会破坏 JS template literal）
            const fs = require('fs');
            const { GitHub } = require('@actions/github');
            const verdict = '${{ steps.parse.outputs.verdict }}' === 'APPROVE' ? 'APPROVE' : 'REQUEST_CHANGES';
            let modelBody = '';
            try {
              modelBody = fs.readFileSync('/tmp/review-output.txt', 'utf8');
            } catch (e) {
              modelBody = '⚠️ Review output file missing. See workflow logs.';
            }
            // 用 + 拼接（单引号字符串）而非 template literal → 模型 body 含反引号 / ${ 也不会破坏 JS 解析
            const body = '## 🤖 MiniMax Code Review\n\nVerdict: **' + verdict + '**\n\n---\n\n' + modelBody;

            const pat = '${{ secrets.REVIEW_BOT_TOKEN }}';
            const hasPat = !!pat;
            const prNumber = context.issue.number;
            const { owner, repo } = context.repo;

            // workflow_dispatch 路径可能没有 PR context
            if (!prNumber || !context.issue) {
              core.warning('No PR context (workflow_dispatch?). Body will be logged only:');
              core.info(body);
              return;
            }

            // 显式建 PAT client 调 pulls.createReview（只 PAT 走这条路径）
            // + self-approve 检测：PAT 账号 == PR 作者时 GitHub 会拒绝 "can not
            // approve your own pull request"，直接走 fallback 避免无谓的 PAT 调用
            if (hasPat && (verdict === 'APPROVE' || verdict === 'REQUEST_CHANGES')) {
              try {
                const patGithub = new GitHub(pat);
                // 拿 PAT 自身账号
                let patLogin = null;
                try {
                  const me = await patGithub.rest.users.getAuthenticated();
                  patLogin = me.data.login;
                } catch (e) {
                  core.warning('PAT auth check failed: ' + e.message);
                }
                // 拿 PR 作者
                let prAuthor = null;
                try {
                  const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
                  prAuthor = pr.data.user?.login;
                } catch (e) {
                  core.warning('PR author fetch failed: ' + e.message);
                }
                if (patLogin && prAuthor && patLogin === prAuthor) {
                  core.warning('PAT account (' + patLogin + ') equals PR author (' + prAuthor + ') — skipping pulls.createReview (self-approve forbidden by GitHub). Falling back to comment.');
                } else {
                  await patGithub.rest.pulls.createReview({
                    owner, repo, pull_number: prNumber,
                    event: verdict,
                    body: body
                  });
                  core.info('Posted ' + verdict + ' review via PAT');
                  return;
                }
              } catch (e) {
                core.warning('PAT review failed: ' + e.message + '. Falling back to comment.');
              }
            }

            // Fallback: 用 GITHUB_TOKEN client (`github`) 发 comment
            // —— 跟上面 PAT 路径**完全隔离**，即使 PAT 状态被污染也不影响
            const warning = hasPat
              ? '\n\n---\n⚠️ 正式 review 提交失败或被跳过（self-approve），已自动降级为 comment，**不计入 branch protection 批准**。'
              : '\n\n---\n⚠️ `REVIEW_BOT_TOKEN` secret 未配置，本次仅作 comment，**不计入 branch protection 批准**。';
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber,
              body: body + warning
            });
            core.info('Posted comment fallback (verdict=' + verdict + ', counts_as_approval=false)');
