name: PR Build & Test

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [test/**]
  # workflow_dispatch 允许手动 trigger（PR #88 教训：synchronize 事件有时不触发新 run，
  # 手动 trigger 可作为 fallback）。workflow 跑时用调用时的 ref 内容（默认 main，可指定 feature 分支）。
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore 10e0.slnx

      # format 必须在 restore 之后、且加 --no-restore：否则 dotnet format 会做隐式 restore，
      # 在 .NET 10 SDK 版本漂移时报 "Restore operation failed"（2026-06-20 #62 撞到）。
      - name: Check code format
        run: dotnet format 10e0.slnx --no-restore --verify-no-changes --severity warn

      - name: Build (Release)
        run: dotnet build 10e0.slnx --no-restore -c Release

      - name: Run tests (coverage gate ≥ 80%)
        run: |
          # --filter "Requires!=Docker"：跳过所有标了 [Trait("Requires", "Docker")] 的测试（#82 PR #88 引入）。
          # 这些测试用 Testcontainers 起 SQL Server 容器做真并发验证：
          #   - 本地开发机有 Docker：直接 `dotnet test` 即可（测试 loud-fail 提醒你 Docker 没起）
          #   - CI：见 .github/workflows/docker-integration-tests.yml（ubuntu-latest 自带 Docker，
          #          单独跑 Requires=Docker 测试）；本 pr-build.yml 不重复跑以省 CI 资源
          dotnet test 10e0.slnx \
            -c Release \
            --filter "Requires!=Docker" \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "html;LogFileName=test-results.html" \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:ThresholdLine=80

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            **/TestResults/*.trx
            **/TestResults/*.html
          retention-days: 14

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_number }}
          path: "**/TestResults/**/coverage.cobertura.xml"
          retention-days: 14
