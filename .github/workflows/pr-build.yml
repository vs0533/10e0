name: PR Build & Test

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [test/coverage-80]

permissions:
  contents: read

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install fonts (required by ImageProcessor tests)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-liberation

      - name: Restore dependencies
        run: dotnet restore 10e0.slnx

      - name: Build (Release)
        run: dotnet build 10e0.slnx --no-restore -c Release

      - name: Run tests (coverage gate ≥ 80%)
        run: |
          dotnet test 10e0.slnx \
            -c Release \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "html;LogFileName=test-results.html" \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:ThresholdLine=80

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            **/TestResults/*.trx
            **/TestResults/*.html
          retention-days: 14

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_number }}
          path: "**/TestResults/**/coverage.cobertura.xml"
          retention-days: 14
